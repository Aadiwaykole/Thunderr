<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub User Explorer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    padding:40px;

    background:
    radial-gradient(circle at top left,#2563eb 0%,transparent 30%),
    radial-gradient(circle at top right,#9333ea 0%,transparent 30%),
    #050816;

    color:white;
}

.header{
    text-align:center;
    margin-bottom:50px;
}

.header h1{
    font-size:4rem;
    font-weight:800;

    background:linear-gradient(
    90deg,
    #60a5fa,
    #a855f7,
    #ec4899);

    -webkit-background-clip:text;
    color:transparent;
}

.header p{
    margin-top:10px;
    color:#94a3b8;
    font-size:1.2rem;
}

.search-container{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:50px;
    flex-wrap:wrap;
}

input{
    width:400px;
    padding:18px;

    border:none;
    outline:none;

    border-radius:18px;

    background:
    rgba(255,255,255,.08);

    backdrop-filter:blur(15px);

    color:white;

    font-size:20px;

    border:1px solid
    rgba(255,255,255,.15);
}

input::placeholder{
    color:#94a3b8;
}

button{

    padding:18px 30px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    font-size:18px;

    color:white;

    background:
    linear-gradient(
    135deg,
    #3b82f6,
    #9333ea);

    transition:.3s;
}

button:hover{

    transform:
    translateY(-3px);

    box-shadow:
    0 15px 40px
    rgba(147,51,234,.4);
}

#root{

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:30px;
}

/* These styles automatically apply
   to divs created by your JS */

#root > div{

    width:280px;

    padding:20px;

    border-radius:24px;

    background:
    rgba(255,255,255,.05);

    backdrop-filter:blur(20px);

    border:1px solid
    rgba(255,255,255,.1);

    transition:.3s;

    box-shadow:
    0 8px 20px
    rgba(0,0,0,.3);
}

#root > div:hover{

    transform:
    translateY(-8px)
    scale(1.03);

    box-shadow:
    0 15px 40px
    rgba(59,130,246,.25);
}

#root img{

    width:180px !important;
    height:180px !important;

    border-radius:50%;

    object-fit:cover;

    border:4px solid #60a5fa;

    box-shadow:
    0 0 25px
    rgba(96,165,250,.5);
}

#root p{

    margin-top:15px;

    font-size:1.4rem;

    font-weight:700;

    color:white;
}

.footer{
    text-align:center;
    margin-top:60px;
    color:#94a3b8;
}

</style>
</head>

<body>

<div class="header">
    <h1>🚀 GitHub Explorer</h1>
    <p>Search and explore GitHub users using JavaScript & GitHub API</p>
</div>

<div class="search-container">
    <input
    type="number"
    placeholder="Enter number of users">

    <button>
        Search
    </button>
</div>

<div id="root"></div>

<div class="footer">
    Built with JavaScript • Fetch API • DOM Manipulation
</div>

<script src="./first.js"></script>

</body>
</html>
